<section>
  <div class="page-header">
    <div style="display: flex; align-items: center; gap: 12px;">
      <button class="btn btn-secondary" id="back-to-runs-btn"
              style="display:none;">← Back to Runs</button>
      <div>
        <div class="page-title" id="logs-title">Live logs</div>
        <div class="page-subtitle" id="logs-subtitle">Running monitor output (SSE)</div>
      </div>
    </div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
      <!-- Filter controls — multi-run aware -->
      <select class="select" id="logs-filter-profile" style="min-width: 160px;">
        <option value="">All profiles</option>
        <!-- populated by JS with unique profile names seen in the buffer -->
      </select>
      <select class="select" id="logs-filter-level" style="min-width: 120px;">
        <option value="">All levels</option>
        <option value="info">Info</option>
        <option value="warning">Warning</option>
        <option value="error">Error</option>
      </select>
      <input type="text" class="input" id="logs-filter-text"
             placeholder="grep text…" style="min-width: 160px; max-width: 220px;">
      <button class="btn btn-secondary" id="switch-to-live-btn"
              style="display:none;">● Switch to live</button>
      <!-- Copy / Download — operate on the CURRENTLY-VISIBLE log set.
           If filters are active, only filtered lines get copied/saved;
           that matches intuition ("what you see is what you get"). -->
      <button class="btn btn-secondary" id="copy-logs-btn"
              title="Copy visible logs to clipboard">📋 Copy</button>
      <button class="btn btn-secondary" id="download-logs-btn"
              title="Save visible logs as .txt file">⬇ Download</button>
      <button class="btn btn-secondary" id="clear-logs-btn">Clear</button>
    </div>
  </div>

  <!-- Selected-filter chip strip — shown when filters are active -->
  <div class="logs-filter-summary" id="logs-filter-summary" style="display:none;">
    Filtering: <span id="logs-filter-chips"></span>
    <button class="btn-link" id="logs-filter-reset">reset filters</button>
  </div>

  <div class="card">
    <div class="logs-box" id="logs-box">
      <div class="muted">Start the monitor to see logs here…</div>
    </div>
  </div>
</section>
